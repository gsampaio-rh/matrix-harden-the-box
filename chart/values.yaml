namespace: workshop-content

image: quay.io/matrix-workshop/harden-the-box:latest
replicas: 1
port: 8080

build:
  enabled: true
  dockerfilePath: build/Dockerfile

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "256Mi"

env:
  teamPrefix: team
  defaultTeamCount: "10"
