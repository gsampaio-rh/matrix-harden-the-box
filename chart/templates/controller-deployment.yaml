apiVersion: apps/v1
kind: Deployment
metadata:
  name: harden-the-box
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "htb.labels" . | nindent 4 }}
    {{- include "htb.selectorLabels" . | nindent 4 }}
  {{- if .Values.build.enabled }}
  annotations:
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"harden-the-box:latest","namespace":"{{ .Values.namespace }}"},"fieldPath":"spec.template.spec.containers[?(@.name==\"harden-the-box\")].image"}]
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "htb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "htb.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: harden-the-box
      containers:
        - name: harden-the-box
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
          env:
            - name: HTB_TEAM_PREFIX
              value: {{ .Values.env.teamPrefix }}
            - name: HTB_DEFAULT_TEAM_COUNT
              value: {{ .Values.env.defaultTeamCount | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
